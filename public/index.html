<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Space Invaders</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
        }
        #app {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5vh;
        }
        #title {
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: clamp(1.4rem, 4vw, 2.5rem);
            letter-spacing: 0.3em;
            text-align: center;
            margin: 0;
        }
        #game {
            display: block;
            background: #000;
            border: 1px solid #fff;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            touch-action: none;
        }
        #hud {
            display: flex;
            justify-content: space-between;
            width: 95%;
            max-width: 800px;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            font-size: clamp(0.9rem, 2.2vw, 1.2rem);
            letter-spacing: 0.15em;
            visibility: hidden;
        }
        #hud.visible { visibility: visible; }
        #stage {
            position: relative;
        }
        #namePanel {
            position: absolute;
            left: 50%;
            top: 68%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            pointer-events: auto;
        }
        #namePanel.hidden { display: none; }
        #nameInput {
            background: #000;
            color: #fff;
            border: 1px solid #fff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            letter-spacing: 0.15em;
            padding: 4px 8px;
            text-align: center;
            text-transform: uppercase;
            width: 12ch;
            outline: none;
        }
        #nameHint {
            font-size: 0.7rem;
            opacity: 0.75;
            letter-spacing: 0.05em;
        }
        #resetHi {
            position: absolute;
            left: 50%;
            bottom: 8px;
            transform: translateX(-50%);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.75rem;
            opacity: 0.7;
            background: none;
            border: none;
            cursor: pointer;
            text-decoration: underline;
            padding: 4px 8px;
        }
        #resetHi.hidden { display: none; }
        #quit {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            border: 1px solid #fff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            letter-spacing: 0.15em;
            padding: 4px 10px;
            cursor: pointer;
            display: none;
            touch-action: manipulation;
        }
        #quit.visible { display: block; }
    </style>
</head>
<body>
    <div id="app">
        <h1 id="title">SPACE INVADERS</h1>
        <div id="stage">
            <canvas id="game"></canvas>
            <button id="quit" type="button">QUIT</button>
            <div id="namePanel">
                <input id="nameInput" type="text" maxlength="12" autocomplete="off" spellcheck="false" placeholder="DEIN NAME">
                <div id="nameHint">Dein Spielername wird lokal in deinem Browser gespeichert</div>
            </div>
            <button id="resetHi" type="button">Reset Highscore</button>
        </div>
        <div id="hud">
            <span id="score">SCORE: 0000</span>
            <span id="wave">WAVE 1</span>
        </div>
    </div>

    <script type="module">
        import {
            PLAYER_SPRITE, BULLET_SPRITE, ALIEN_BULLET_SPRITE,
            TUX_SPRITE, WINDOWS_SPRITE, CREEPER_SPRITE, BUNKER_SPRITE,
            drawSprite, spriteWidth, spriteHeight
        } from './js/sprites.js';

        // ----- Browser-/Touch-Detection (für Mobile-Support) -----
        const isTouch = 'ontouchstart' in window || matchMedia('(pointer: coarse)').matches;
        window.__isTouch = isTouch;

        // ----- Web Audio: AudioContext-Unlock (kritisch für iOS Safari) -----
        let audioCtx = null;
        function ensureAudio() {
            if (!audioCtx) {
                const Ctor = window.AudioContext || window.webkitAudioContext;
                if (Ctor) audioCtx = new Ctor();
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }
        ['keydown', 'click', 'touchstart'].forEach(evt => {
            window.addEventListener(evt, ensureAudio, { passive: true });
        });

        function playPew() {
            if (!audioCtx) return;
            const t0 = audioCtx.currentTime;
            const dur = 0.08;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(800, t0);
            osc.frequency.exponentialRampToValueAtTime(200, t0 + dur);
            gain.gain.setValueAtTime(0.18, t0);
            gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start(t0);
            osc.stop(t0 + dur);
        }

        // ----- Marsch-Sound: 4 Bass-Töne, 100ms square -----
        const MARCH_FREQS = [100, 90, 80, 70];
        let marchStep = 0;
        function playMarchTick() {
            if (!audioCtx) return;
            const t0 = audioCtx.currentTime;
            const dur = 0.1;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(MARCH_FREQS[marchStep % MARCH_FREQS.length], t0);
            gain.gain.setValueAtTime(0.12, t0);
            gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start(t0);
            osc.stop(t0 + dur);
            marchStep++;
        }

        // ----- Treffer-Sound: kurzer Noise-Burst 50ms -----
        function playHit() {
            if (!audioCtx) return;
            const dur = 0.05;
            const sr = audioCtx.sampleRate;
            const len = Math.max(1, Math.floor(sr * dur));
            const buf = audioCtx.createBuffer(1, len, sr);
            const data = buf.getChannelData(0);
            for (let i = 0; i < len; i++) {
                data[i] = (Math.random() * 2 - 1) * (1 - i / len);
            }
            const src = audioCtx.createBufferSource();
            src.buffer = buf;
            const gain = audioCtx.createGain();
            gain.gain.value = 0.25;
            src.connect(gain).connect(audioCtx.destination);
            src.start();
        }

        // ----- Game-Over-Sound: square 400 -> 50 Hz über 1 Sek -----
        function playGameOver() {
            if (!audioCtx) return;
            const t0 = audioCtx.currentTime;
            const dur = 1.0;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(400, t0);
            osc.frequency.exponentialRampToValueAtTime(50, t0 + dur);
            gain.gain.setValueAtTime(0.2, t0);
            gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start(t0);
            osc.stop(t0 + dur);
        }

        // ----- Canvas-Setup mit 4:3 Aspect Ratio, responsive -----
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;

        const ASPECT_W = 4;
        const ASPECT_H = 3;
        const MAX_WIDTH = 800;

        function resizeCanvas() {
            const titleEl = document.getElementById('title');
            const titleH = titleEl.getBoundingClientRect().height;
            const gap = window.innerHeight * 0.015 * 2; // 2x 1.5vh
            const availW = window.innerWidth * 0.95;
            const availH = window.innerHeight - titleH - gap - 16;

            let w = Math.min(MAX_WIDTH, availW);
            let h = w * ASPECT_H / ASPECT_W;
            if (h > availH) {
                h = availH;
                w = h * ASPECT_W / ASPECT_H;
            }
            canvas.width = Math.floor(w);
            canvas.height = Math.floor(h);
            ctx.imageSmoothingEnabled = false;
        }
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', resizeCanvas);
        resizeCanvas();

        // ----- Sprite-Skalierung (responsive) -----
        function getSpriteScale(baseFactor = 1) {
            const factor = canvas.width >= 600 ? 3 : 2;
            return factor * baseFactor;
        }

        // Eigene Skalierung für Aliens: auf Mobile kleiner (1.5 statt 2),
        // zusätzlich dynamisch verkleinert, bis Block + 15% Padding pro Seite
        // ins Canvas passt: 11*sw*scale + 10*spacing <= 0.7 * canvas.width.
        function getAlienScale() {
            const alienW = spriteWidth(TUX_SPRITE); // 16
            const isMobile = canvas.width < 600;
            let scale = isMobile ? 1.5 : 3;
            const minScale = 0.5;
            const target = canvas.width * 0.7;
            while (scale > minScale) {
                const spacing = Math.max(isMobile ? 4 : 6, scale * 2);
                const total = ALIEN_COLS * alienW * scale + (ALIEN_COLS - 1) * spacing;
                if (total <= target) break;
                scale -= 0.25;
            }
            return Math.max(minScale, scale);
        }
        function getAlienSpacing() {
            const isMobile = canvas.width < 600;
            return Math.max(isMobile ? 4 : 6, getAlienScale() * 2);
        }

        // ----- Spieler -----
        const player = { x: 0, y: 0 };

        function playerW() { return spriteWidth(PLAYER_SPRITE) * getSpriteScale(); }
        function playerH() { return spriteHeight(PLAYER_SPRITE) * getSpriteScale(); }

        function placePlayerInitial() {
            player.x = (canvas.width - playerW()) / 2;
            player.y = canvas.height - playerH() - 30;
        }
        placePlayerInitial();

        window.addEventListener('resize', () => {
            player.y = canvas.height - playerH() - 30;
            player.x = Math.max(0, Math.min(player.x, canvas.width - playerW()));
            buildAliens();
            buildBunkers();
        });

        // ----- Tastatur-Steuerung (state-basiert für Multi-Key) -----
        const keys = Object.create(null);
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.code === 'Space' || e.key === ' ') keys['Space'] = true;
            if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', ' '].includes(e.key)) {
                e.preventDefault();
            }
        });
        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
            if (e.code === 'Space' || e.key === ' ') keys['Space'] = false;
        });

        // ----- Geschosse -----
        const bullets = [];
        let lastShoot = 0;
        const SHOOT_COOLDOWN_MS = 250;

        function bulletScale()  { return 3; }
        function bulletW()      { return spriteWidth(BULLET_SPRITE)  * bulletScale(); }
        function bulletH()      { return spriteHeight(BULLET_SPRITE) * bulletScale(); }

        // Alien-Geschosse
        const alienBullets = [];
        let lastAlienShot = 0;
        let nextAlienShotDelay = 1500; // 1-2s
        function alienBulletScale() { return 3; }
        function alienBulletW() { return spriteWidth(ALIEN_BULLET_SPRITE)  * alienBulletScale(); }
        function alienBulletH() { return spriteHeight(ALIEN_BULLET_SPRITE) * alienBulletScale(); }

        function tryShoot() {
            const now = Date.now();
            if (now - lastShoot < SHOOT_COOLDOWN_MS) return;
            lastShoot = now;
            // Startposition: zentriert oberhalb des Spieler-Lauf-Pixels
            const bx = player.x + playerW() / 2 - bulletW() / 2;
            const by = player.y - bulletH();
            bullets.push({ x: bx, y: by });
            playPew();
        }

        // ----- Touch Auto-Fire (alle 500ms auf Touch-Geräten, nur PLAYING) -----
        if (isTouch) {
            setInterval(() => { if (gameState === 'PLAYING') keys['Space'] = true; }, 500);
        }

        // ----- Game-State -----
        const STATE = { START: 'START', PLAYING: 'PLAYING', GAME_OVER: 'GAME_OVER' };
        let gameState = STATE.START;
        let score = 0;
        let wave = 1;
        let speedMultiplier = 1;
        let isNewHighScore = false;

        // ----- localStorage Helpers -----
        const LS_NAME       = 'playerName';
        const LS_HIGHSCORE  = 'highScore';
        const LS_HIGHWAVE   = 'highScoreWave';
        function lsGet(k, def = null) {
            try { const v = localStorage.getItem(k); return v === null ? def : v; }
            catch { return def; }
        }
        function lsSet(k, v) { try { localStorage.setItem(k, v); } catch { /* ignore */ } }
        function lsDel(k)    { try { localStorage.removeItem(k); }      catch { /* ignore */ } }

        function getHighScore() { const v = parseInt(lsGet(LS_HIGHSCORE, '0'), 10); return isNaN(v) ? 0 : v; }
        function getHighWave()  { const v = parseInt(lsGet(LS_HIGHWAVE,  '1'), 10); return isNaN(v) ? 1 : v; }
        function getPlayerName() { return (lsGet(LS_NAME, '') || '').toUpperCase(); }

        // ----- Name-Input -----
        const namePanel = document.getElementById('namePanel');
        const nameInput = document.getElementById('nameInput');
        const resetHiBtn = document.getElementById('resetHi');
        const NAME_RE = /[^A-Za-z0-9 \-]/g;

        function sanitizeName(v) {
            return (v || '').replace(NAME_RE, '').slice(0, 12).toUpperCase();
        }
        nameInput.value = getPlayerName();
        nameInput.addEventListener('focus', () => nameInput.select());
        nameInput.addEventListener('input', () => {
            const clean = sanitizeName(nameInput.value);
            if (nameInput.value !== clean) nameInput.value = clean;
            lsSet(LS_NAME, clean);
        });
        nameInput.addEventListener('keydown', (e) => {
            // Eingaben sollen NICHT das Spiel starten / steuern
            e.stopPropagation();
            if (e.key === 'Enter') {
                e.preventDefault();
                nameInput.blur();
            }
        });
        resetHiBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            lsDel(LS_HIGHSCORE);
            lsDel(LS_HIGHWAVE);
        });

        const hudEl   = document.getElementById('hud');
        const scoreEl = document.getElementById('score');
        const waveEl  = document.getElementById('wave');
        const quitBtn = document.getElementById('quit');

        function updateHud() {
            scoreEl.textContent = 'SCORE: ' + String(score).padStart(4, '0');
            waveEl.textContent  = 'WAVE ' + wave;
            const showHud = gameState === STATE.PLAYING || gameState === STATE.GAME_OVER;
            hudEl.classList.toggle('visible', showHud);
            const showQuit = isTouch && gameState === STATE.PLAYING;
            quitBtn.classList.toggle('visible', showQuit);
            // Name-Input + Reset nur im START-Screen sichtbar
            const showStart = gameState === STATE.START;
            namePanel.classList.toggle('hidden', !showStart);
            resetHiBtn.classList.toggle('hidden', !showStart);
        }

        function startGame() {
            // Falls Name-Input fokussiert ist: nicht starten
            if (document.activeElement === nameInput) return;
            score = 0;
            wave = 1;
            speedMultiplier = 1;
            isNewHighScore = false;
            bullets.length = 0;
            alienBullets.length = 0;
            buildAliens();
            buildBunkers();
            placePlayerInitial();
            lastAlienTick = performance.now();
            lastAlienShot = performance.now();
            gameState = STATE.PLAYING;
            updateHud();
        }

        function nextWave() {
            wave += 1;
            speedMultiplier *= 1.5;
            buildAliens();
            buildBunkers();
            bullets.length = 0;
            alienBullets.length = 0;
            lastAlienTick = performance.now();
            lastAlienShot = performance.now();
            updateHud();
        }

        function gameOver() {
            gameState = STATE.GAME_OVER;
            // Highscore prüfen
            const prev = getHighScore();
            if (score > prev) {
                lsSet(LS_HIGHSCORE, String(score));
                lsSet(LS_HIGHWAVE,  String(wave));
                isNewHighScore = true;
            } else {
                isNewHighScore = false;
            }
            playGameOver();
            updateHud();
        }

        function quitToStart() {
            gameState = STATE.START;
            keys['Space'] = false;
            updateHud();
        }

        // ----- Alien-Formation -----
        const ALIEN_COLS = 11;
        const ALIEN_ROWS = 4;
        const ALIEN_TOTAL = ALIEN_COLS * ALIEN_ROWS;

        // Reihen-Definition (von oben nach unten)
        const ROW_DEFS = [
            { sprite: TUX_SPRITE,     points: 30, color: '#ffffff' }, // Reihe 1
            { sprite: WINDOWS_SPRITE, points: 20, color: '#ffffff' }, // Reihe 2
            { sprite: WINDOWS_SPRITE, points: 20, color: '#ffffff' }, // Reihe 3
            { sprite: CREEPER_SPRITE, points: 10, color: '#ffffff' }  // Reihe 4
        ];

        // Block-Offset (oben-links der Formation) plus Bewegungsrichtung
        const alienBlock = { x: 0, y: 0, dir: 1 };
        const aliens = []; // {row, col, alive, type}

        // Zellen-Größen (aus skaliertem Sprite + Spacing) für aktuelle Canvas-Größe
        function alienCellW() { return spriteWidth(TUX_SPRITE)  * getAlienScale() + getAlienSpacing(); }
        function alienCellH() { return spriteHeight(TUX_SPRITE) * getAlienScale() + Math.max(4, getAlienScale() * 2); }
        function alienStepX() { return Math.max(2, getAlienScale() * 2); } // horizontaler Schritt
        function alienStepY() { return canvas.height * 0.045; }              // vertikaler Schritt ~4.5%

        function buildAliens() {
            aliens.length = 0;
            for (let r = 0; r < ALIEN_ROWS; r++) {
                for (let c = 0; c < ALIEN_COLS; c++) {
                    aliens.push({ row: r, col: c, alive: true, type: r });
                }
            }
            // Top-Padding: Desktop ~13%, Mobile ~8%
            const topPct = canvas.width >= 600 ? 0.13 : 0.08;
            alienBlock.x = (canvas.width - ALIEN_COLS * alienCellW()) / 2;
            alienBlock.y = canvas.height * topPct;
            alienBlock.dir = 1;
        }
        buildAliens();

        function aliveCount() {
            let n = 0;
            for (const a of aliens) if (a.alive) n++;
            return n;
        }

        function alienTickInterval(n) {
            if (n <= 1) return 150;
            return 150 + (900 - 150) * (n - 1) / (ALIEN_TOTAL - 1);
        }

        // Bounding-Box des lebenden Blocks
        function alienBlockBounds() {
            let minCol = ALIEN_COLS, maxCol = -1, maxRow = -1;
            for (const a of aliens) {
                if (!a.alive) continue;
                if (a.col < minCol) minCol = a.col;
                if (a.col > maxCol) maxCol = a.col;
                if (a.row > maxRow) maxRow = a.row;
            }
            return { minCol, maxCol, maxRow };
        }

        let lastAlienTick = performance.now();

        function stepAliens(now) {
            const n = aliveCount();
            if (n === 0) return;
            const interval = alienTickInterval(n) / speedMultiplier;
            if (now - lastAlienTick < interval) return;
            lastAlienTick = now;

            const bb = alienBlockBounds();
            const stepX = alienStepX();
            const cellW = alienCellW();
            const blockLeft  = alienBlock.x + bb.minCol * cellW;
            const blockRight = alienBlock.x + (bb.maxCol + 1) * cellW;

            const nextLeft  = blockLeft  + alienBlock.dir * stepX;
            const nextRight = blockRight + alienBlock.dir * stepX;

            if (nextLeft < 0 || nextRight > canvas.width) {
                alienBlock.dir *= -1;
                alienBlock.y += alienStepY();
            } else {
                alienBlock.x += alienBlock.dir * stepX;
            }

            playMarchTick();
        }

        function drawAliens() {
            const cellW = alienCellW();
            const cellH = alienCellH();
            const sw = spriteWidth(TUX_SPRITE)  * getAlienScale();
            const sh = spriteHeight(TUX_SPRITE) * getAlienScale();
            const padX = (cellW - sw) / 2;
            const padY = (cellH - sh) / 2;
            for (const a of aliens) {
                if (!a.alive) continue;
                const def = ROW_DEFS[a.type];
                const x = alienBlock.x + a.col * cellW + padX;
                const y = alienBlock.y + a.row * cellH + padY;
                drawSprite(ctx, def.sprite, x, y, getAlienScale(), def.color);
            }
        }

        // ----- Bunker (zerstörbar, pixelweise) -----
        const BUNKER_COUNT = 4;
        const bunkers = []; // { x, y, scale, pixels: 2D-Array Kopie }

        function getBunkerScale() {
            return canvas.width >= 600 ? 3 : 1.5;
        }
        function bunkerW(b) { return spriteWidth(BUNKER_SPRITE)  * b.scale; }
        function bunkerH(b) { return spriteHeight(BUNKER_SPRITE) * b.scale; }

        function buildBunkers() {
            bunkers.length = 0;
            const scale = getBunkerScale();
            const w = spriteWidth(BUNKER_SPRITE)  * scale;
            const h = spriteHeight(BUNKER_SPRITE) * scale;
            const yFrac = canvas.width >= 600 ? 0.75 : 0.60;
            const y = canvas.height * yFrac;
            // gleichmäßig verteilen: 4 Bunker, 5 Lücken (Rand+Zwischenraum)
            const totalSpace = canvas.width - BUNKER_COUNT * w;
            const gap = totalSpace / (BUNKER_COUNT + 1);
            for (let i = 0; i < BUNKER_COUNT; i++) {
                const x = gap + i * (w + gap);
                // Pixel-Matrix als String-Array kopieren (zerstörbar)
                const pixels = BUNKER_SPRITE.map(row => row.split(''));
                bunkers.push({ x, y, scale, pixels });
            }
        }
        buildBunkers();

        function drawBunkers() {
            for (const b of bunkers) {
                for (let row = 0; row < b.pixels.length; row++) {
                    for (let col = 0; col < b.pixels[row].length; col++) {
                        if (b.pixels[row][col] === '.') continue;
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(
                            b.x + col * b.scale,
                            b.y + row * b.scale,
                            b.scale, b.scale
                        );
                    }
                }
            }
        }

        // Prüft pixel-genaue Kollision eines Bullet-Rechtecks mit Bunker-Pixeln,
        // entfernt die getroffenen Pixel (und ein paar drumherum für Crater-Effekt).
        // Liefert true bei Treffer.
        function bulletHitsBunker(bx, by, bw, bh) {
            for (const b of bunkers) {
                if (bx + bw <= b.x || bx >= b.x + bunkerW(b)) continue;
                if (by + bh <= b.y || by >= b.y + bunkerH(b)) continue;
                // Bunker-lokale Pixel-Range
                const c0 = Math.max(0, Math.floor((bx - b.x) / b.scale));
                const c1 = Math.min(b.pixels[0].length - 1, Math.floor((bx + bw - 1 - b.x) / b.scale));
                const r0 = Math.max(0, Math.floor((by - b.y) / b.scale));
                const r1 = Math.min(b.pixels.length - 1, Math.floor((by + bh - 1 - b.y) / b.scale));
                let hit = false;
                for (let r = r0; r <= r1 && !hit; r++) {
                    for (let c = c0; c <= c1 && !hit; c++) {
                        if (b.pixels[r][c] !== '.') hit = true;
                    }
                }
                if (!hit) continue;
                // Krater erzeugen: getroffene Range plus 1 Pixel Rand löschen
                for (let r = Math.max(0, r0 - 1); r <= Math.min(b.pixels.length - 1, r1 + 1); r++) {
                    for (let c = Math.max(0, c0 - 1); c <= Math.min(b.pixels[0].length - 1, c1 + 1); c++) {
                        b.pixels[r][c] = '.';
                    }
                }
                return true;
            }
            return false;
        }

        // ----- Alien-Schuss-Logik -----
        function tryAlienShoot(now) {
            if (now - lastAlienShot < nextAlienShotDelay) return;
            // Pro Spalte den lebenden Alien mit dem höchsten row finden (= unterster)
            const lowestPerCol = new Map();
            for (const a of aliens) {
                if (!a.alive) continue;
                const cur = lowestPerCol.get(a.col);
                if (!cur || a.row > cur.row) lowestPerCol.set(a.col, a);
            }
            const candidates = [...lowestPerCol.values()];
            if (candidates.length === 0) return;
            const shooter = candidates[Math.floor(Math.random() * candidates.length)];
            const r = alienRectAt(shooter);
            const bx = r.x + r.w / 2 - alienBulletW() / 2;
            const by = r.y + r.h;
            alienBullets.push({ x: bx, y: by });
            lastAlienShot = now;
            nextAlienShotDelay = 1000 + Math.random() * 1000; // 1-2s
        }

        // ----- Touch-Steuerung: Drag auf dem Canvas -----
        let touchTargetX = null;

        function canvasXFromClient(clientX) {
            const rect = canvas.getBoundingClientRect();
            const scale = canvas.width / rect.width;
            return (clientX - rect.left) * scale;
        }

        function handleTouch(e) {
            if (e.touches.length === 0) return;
            // Touch im Name-Input nicht abfangen
            if (e.target === nameInput) return;
            e.preventDefault();
            // Name-Input ggf. schliessen
            if (document.activeElement === nameInput) nameInput.blur();
            // Tap-to-Start / Tap-to-Restart
            if (gameState === STATE.START) { startGame(); return; }
            if (gameState === STATE.GAME_OVER) { quitToStart(); return; }
            touchTargetX = canvasXFromClient(e.touches[0].clientX);
        }
        function handleTouchEnd(e) {
            if (e.touches.length === 0) touchTargetX = null;
        }
        canvas.addEventListener('touchstart', handleTouch, { passive: false });
        canvas.addEventListener('touchmove', handleTouch, { passive: false });
        canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
        canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });

        // Desktop-Maus-Klick auf Canvas: Start/Restart
        canvas.addEventListener('click', () => {
            if (document.activeElement === nameInput) { nameInput.blur(); return; }
            if (gameState === STATE.START) startGame();
            else if (gameState === STATE.GAME_OVER) quitToStart();
        });

        // Quit-Button (Touch + Desktop) und ESC-Taste
        quitBtn.addEventListener('click', (e) => { e.stopPropagation(); quitToStart(); });
        document.addEventListener('keydown', (e) => {
            // Ignorieren während Eingabe in Name-Feld
            if (document.activeElement === nameInput) return;
            if (e.key === 'Escape') {
                if (gameState === STATE.PLAYING || gameState === STATE.GAME_OVER) quitToStart();
            }
            // Space im START/GAME_OVER startet/restartet
            if ((e.code === 'Space' || e.key === ' ')) {
                if (gameState === STATE.START) startGame();
                else if (gameState === STATE.GAME_OVER) quitToStart();
            }
        });

        updateHud();

        // ----- Game-Loop -----
        let lastTime = performance.now();

        function aabb(ax, ay, aw, ah, bx, by, bw, bh) {
            return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
        }

        function alienRectAt(a) {
            const cellW = alienCellW();
            const cellH = alienCellH();
            const sw = spriteWidth(TUX_SPRITE)  * getAlienScale();
            const sh = spriteHeight(TUX_SPRITE) * getAlienScale();
            const padX = (cellW - sw) / 2;
            const padY = (cellH - sh) / 2;
            return {
                x: alienBlock.x + a.col * cellW + padX,
                y: alienBlock.y + a.row * cellH + padY,
                w: sw,
                h: sh
            };
        }

        function update(dt) {
            if (gameState !== STATE.PLAYING) return;

            // Querung links<->rechts in 2.5 Sekunden, an Canvas-Breite normalisiert
            const speedPxPerSec = canvas.width / 2.5;

            // Tastatur
            let dx = 0;
            if (keys['ArrowLeft']  || keys['a'] || keys['A']) dx -= 1;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
            player.x += dx * speedPxPerSec * dt;

            // Touch: Schiff folgt Finger horizontal, gleiche Max-Speed -> nicht ruckelig
            if (touchTargetX !== null) {
                const targetX = touchTargetX - playerW() / 2;
                const diff = targetX - player.x;
                const maxStep = speedPxPerSec * dt;
                if (Math.abs(diff) <= maxStep) {
                    player.x = targetX;
                } else {
                    player.x += Math.sign(diff) * maxStep;
                }
            }

            // Clamp
            const maxX = canvas.width - playerW();
            if (player.x < 0) player.x = 0;
            if (player.x > maxX) player.x = maxX;

            // Bodenposition jeden Frame frisch (resize-sicher)
            player.y = canvas.height - playerH() - 30;

            // Schießen
            if (keys['Space'] && Date.now() - lastShoot > SHOOT_COOLDOWN_MS) {
                tryShoot();
                if (isTouch) keys['Space'] = false;
            }

            // Geschosse bewegen + Kollision mit Aliens / Bunkern
            const bulletSpeed = canvas.height / 1.0;
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.y -= bulletSpeed * dt;
                if (b.y + bulletH() < 0) { bullets.splice(i, 1); continue; }
                // Bunker zuerst (auf dem Weg nach oben)
                if (bulletHitsBunker(b.x, b.y, bulletW(), bulletH())) {
                    bullets.splice(i, 1);
                    continue;
                }
                // Aliens
                let hit = false;
                for (const a of aliens) {
                    if (!a.alive) continue;
                    const r = alienRectAt(a);
                    if (aabb(b.x, b.y, bulletW(), bulletH(), r.x, r.y, r.w, r.h)) {
                        a.alive = false;
                        score += ROW_DEFS[a.type].points;
                        playHit();
                        hit = true;
                        break;
                    }
                }
                if (hit) bullets.splice(i, 1);
            }

            // Alien-Geschosse: spawnen + bewegen + Kollision
            tryAlienShoot(performance.now());
            const alienBulletSpeed = canvas.height / 1.5; // Querung in 1.5s
            for (let i = alienBullets.length - 1; i >= 0; i--) {
                const b = alienBullets[i];
                b.y += alienBulletSpeed * dt;
                if (b.y > canvas.height) { alienBullets.splice(i, 1); continue; }
                // Bunker
                if (bulletHitsBunker(b.x, b.y, alienBulletW(), alienBulletH())) {
                    alienBullets.splice(i, 1);
                    continue;
                }
                // Spieler
                if (aabb(b.x, b.y, alienBulletW(), alienBulletH(), player.x, player.y, playerW(), playerH())) {
                    alienBullets.splice(i, 1);
                    playHit();
                    gameOver();
                    return;
                }
            }

            // Alien-Block-Bewegung (zeitgesteuert + Marsch-Sound, mit Wellen-Speed)
            stepAliens(performance.now());

            // Game-Over: Aliens erreichen Spieler-Y
            const bb = alienBlockBounds();
            if (bb.maxRow >= 0) {
                const cellH = alienCellH();
                const sh = spriteHeight(TUX_SPRITE) * getAlienScale();
                const padY = (cellH - sh) / 2;
                const lowestY = alienBlock.y + (bb.maxRow + 1) * cellH - padY;
                if (lowestY >= player.y) { gameOver(); return; }
            }

            // Welle abgeschlossen?
            if (aliveCount() === 0) {
                nextWave();
            }

            updateHud();
        }

        function render() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameState === STATE.START) {
                drawStartScreen();
                return;
            }

            drawAliens();
            drawBunkers();
            drawSprite(ctx, PLAYER_SPRITE, player.x, player.y, getSpriteScale(), '#ffffff');
            for (const b of bullets) {
                drawSprite(ctx, BULLET_SPRITE, b.x, b.y, bulletScale(), '#ffffff');
            }
            for (const b of alienBullets) {
                drawSprite(ctx, ALIEN_BULLET_SPRITE, b.x, b.y, alienBulletScale(), '#ffffff');
            }

            if (gameState === STATE.GAME_OVER) {
                drawGameOverScreen();
            }
        }

        function drawCenteredText(text, yFrac, sizePx, color = '#ffffff') {
            ctx.fillStyle = color;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = 'bold ' + sizePx + 'px "Courier New", monospace';
            ctx.fillText(text, canvas.width / 2, canvas.height * yFrac);
        }

        function drawStartScreen() {
            const big   = Math.max(28, canvas.width * 0.07);
            const small = Math.max(14, canvas.width * 0.03);
            const tiny  = Math.max(12, canvas.width * 0.025);
            drawCenteredText('SPACE INVADERS', 0.22, big);
            const blink = Math.floor(performance.now() / 500) % 2 === 0;
            if (blink) {
                drawCenteredText(isTouch ? 'TAP TO START' : 'PRESS SPACE TO START', 0.45, small);
            }
            // Highscore-Anzeige unten (über dem Reset-Link)
            const hi = getHighScore();
            if (hi > 0) {
                drawCenteredText('DEIN BESTER: ' + hi + ' (Welle ' + getHighWave() + ')', 0.88, tiny);
            }
        }

        function drawGameOverScreen() {
            ctx.fillStyle = 'rgba(0,0,0,0.65)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const big   = Math.max(28, canvas.width * 0.07);
            const med   = Math.max(18, canvas.width * 0.035);
            const small = Math.max(14, canvas.width * 0.03);
            const name = getPlayerName() || 'PLAYER';
            drawCenteredText('GAME OVER', 0.22, big);
            drawCenteredText(name, 0.34, med);
            drawCenteredText('FINAL SCORE: ' + String(score).padStart(4, '0'), 0.45, med);
            drawCenteredText('REACHED WAVE ' + wave, 0.53, med);
            const hi = getHighScore();
            if (hi > 0) {
                drawCenteredText('DEIN BESTER SCORE: ' + hi + ' (Welle ' + getHighWave() + ')', 0.62, small);
            }
            const blink = Math.floor(performance.now() / 500) % 2 === 0;
            if (isNewHighScore && blink) {
                drawCenteredText('NEW PERSONAL BEST!', 0.72, med, '#FFB900');
            }
            if (blink) {
                drawCenteredText(isTouch ? 'TAP TO RESTART' : 'PRESS SPACE TO RESTART', 0.84, small);
            }
        }

        function loop(now) {
            const dt = Math.min(0.05, (now - lastTime) / 1000);
            lastTime = now;
            update(dt);
            render();
            requestAnimationFrame(loop);
        }
        requestAnimationFrame((t) => { lastTime = t; loop(t); });
    </script>
</body>
</html>
